name: AiVi Enterprise CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test-and-lint:
    name: Backend (FastAPI) - Static Analysis & Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Añadimos bcrypt explícitamente para que no falle si falta en requirements.txt
        pip install pytest pytest-asyncio httpx flake8 bcrypt

    - name: Static Analysis (Flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Run Async Test Suite
      env:
        DATABASE_URL: "postgresql+asyncpg://user:pass@localhost:5432/mock_db"
        REDIS_URL: "redis://localhost:6379/0"
        GOOGLE_API_KEY: "mock_gemini_key"
        DEEPGRAM_API_KEY: "mock_deepgram_key"
        ELEVENLABS_API_KEY: "mock_elevenlabs_key"
        DEFAULT_DOCTOR_PASSWORD: "mock_password"
        DEFAULT_PATIENT_PASSWORD: "mock_password"
      run: |
        python -m pytest

  frontend-build-and-lint:
    name: Frontend (React) - Static Analysis & Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: 'frontend/pnpm-lock.yaml'

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: pnpm install

    - name: Static Analysis (ESLint)
      working-directory: ./frontend
      # Quitamos el --if-present que confundía a ESLint
      run: pnpm run lint

    - name: Verify Build (PWA/SPA)
      working-directory: ./frontend
      run: pnpm run build