name: AiVi Enterprise CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test-and-lint:
    name: Backend (FastAPI) - Static Analysis & Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx flake8

    - name: Static Analysis (Flake8)
      run: |
        # Falla si hay errores críticos de sintaxis o variables no definidas
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Advertencias de complejidad (no detiene el pipeline)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Run Async Test Suite
      run: |
        # Ejecuta las pruebas de comportamiento y seguridad
        python -m pytest

  frontend-build-and-lint:
    name: Frontend (React) - Static Analysis & Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Static Analysis (ESLint)
      working-directory: ./frontend
      run: npm run lint --if-present

    - name: Verify Build (PWA/SPA)
      working-directory: ./frontend
      run: npm run build