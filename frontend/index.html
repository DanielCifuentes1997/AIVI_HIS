<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiVi - Portal del Paciente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <h1>AiVi</h1>
            <span class="status-indicator" id="connection-status"></span>
        </div>
        <button id="logout-btn" class="btn-danger">Cerrar Sesión</button>
    </header>
    
    <main class="multimodal-container">
        <section id="chat-history" class="chat-display" aria-live="polite">
        </section>
        
        <section class="controls-section">
            <input type="text" id="message-input" placeholder="Escribe o habla con AiVi..." autocomplete="off">
            <button id="send-btn" class="btn-primary">Enviar</button>
            <button id="mic-btn" class="btn-secondary" aria-label="Activar micrófono">🎙️</button>
        </section>

        <section id="biometric-container" class="hidden">
            <video id="biometric-video" autoplay playsinline></video>
            <canvas id="biometric-canvas"></canvas>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
